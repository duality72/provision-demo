name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/app/**'
      - 'terraform/github/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      github: ${{ steps.filter.outputs.github }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            app:
              - 'terraform/app/**'
            github:
              - 'terraform/github/**'

  plan-app:
    name: plan-app
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build Lambda layer
        working-directory: terraform/app/lambda
        run: bash build-layer.sh

      - uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        working-directory: terraform/app
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: terraform/app
        run: terraform plan -var-file=ci.tfvars -no-color -out=plan.out 2>&1 | tee plan.txt
        env:
          TF_VAR_github_app_private_key_base64: ${{ secrets.APP_PRIVATE_KEY_BASE64 }}
          TF_VAR_age_public_key: ${{ secrets.AGE_PUBLIC_KEY }}
          TF_VAR_age_secret_key: ${{ secrets.AGE_SECRET_KEY }}
          TF_VAR_github_app_id: ${{ secrets.APP_ID }}
          TF_VAR_github_app_installation_id: ${{ secrets.APP_INSTALLATION_ID }}
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Comment plan on PR
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: terraform-app
          message: |
            ### Terraform Plan: `terraform/app`
            ```
            ${{ steps.plan.outputs.stdout }}
            ```

  plan-github:
    name: plan-github
    needs: detect-changes
    if: needs.detect-changes.outputs.github == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        working-directory: terraform/github
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: terraform/github
        run: terraform plan -var-file=ci.tfvars -no-color -out=plan.out 2>&1 | tee plan.txt
        env:
          TF_VAR_github_token: ${{ secrets.GH_PAT }}
          TF_VAR_age_secret_key: ${{ secrets.AGE_SECRET_KEY }}
          TF_VAR_sops_kms_arn: ${{ secrets.SOPS_KMS_ARN }}
          TF_VAR_aws_role_arn: ${{ secrets.PLATFORM_AWS_ROLE_ARN }}
          TF_VAR_demo_ci_aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}

      - name: Comment plan on PR
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: terraform-github
          message: |
            ### Terraform Plan: `terraform/github`
            ```
            ${{ steps.plan.outputs.stdout }}
            ```
