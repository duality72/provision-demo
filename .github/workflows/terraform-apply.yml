name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'terraform/app/**'
      - 'terraform/github/**'

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      github: ${{ steps.filter.outputs.github }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'terraform/app/**'
            github:
              - 'terraform/github/**'

  apply-app:
    name: apply-app
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform/app
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform/app
        run: terraform apply -var-file=ci.tfvars -auto-approve -no-color
        env:
          TF_VAR_github_app_private_key_base64: ${{ secrets.GITHUB_APP_PRIVATE_KEY_BASE64 }}
          TF_VAR_age_public_key: ${{ secrets.AGE_PUBLIC_KEY }}
          TF_VAR_age_secret_key: ${{ secrets.AGE_SECRET_KEY }}
          TF_VAR_github_app_id: ${{ secrets.GITHUB_APP_ID }}
          TF_VAR_github_app_installation_id: ${{ secrets.GITHUB_APP_INSTALLATION_ID }}

  apply-github:
    name: apply-github
    needs: detect-changes
    if: needs.detect-changes.outputs.github == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform/github
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform/github
        run: terraform apply -var-file=ci.tfvars -auto-approve -no-color
        env:
          TF_VAR_github_token: ${{ secrets.GH_PAT }}
          TF_VAR_age_secret_key: ${{ secrets.AGE_SECRET_KEY }}
          TF_VAR_sops_kms_arn: ${{ secrets.SOPS_KMS_ARN }}
          TF_VAR_aws_role_arn: ${{ secrets.PLATFORM_AWS_ROLE_ARN }}
          TF_VAR_demo_ci_aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          TF_VAR_github_app_installation_id: ${{ secrets.GITHUB_APP_INSTALLATION_ID }}
